server:
  port: 8090

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/hsr_calculator}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    root: INFO
    com.github.syun9274: INFO